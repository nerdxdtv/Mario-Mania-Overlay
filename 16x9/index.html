<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Mario Mania 16x9 Overlay</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
}

#fit{
  position:fixed;
  inset:0;
  overflow:hidden;
  background:transparent;
}

#stage{
  position:absolute;
  left:50%;
  top:50%;
  width:1920px;
  height:1080px;
  transform-origin:center;
  background:transparent;
  color:white;
}

#frame{
  position:absolute;
  inset:0;
  width:1920px;
  height:1080px;
  object-fit:contain;
  z-index:1;
  pointer-events:none;
}

.live{
  position:absolute;
  z-index:5;
  font-weight:900;
  text-shadow:
    4px 4px 0 #000,
    -2px 2px 0 #000,
    2px -2px 0 #000;
}

#clock{
  right:22px;
  top:8px;
  width:330px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ffe936;
  font-size:22px;
  letter-spacing:.5px;
}

#amount{
  left:58px;
  bottom:96px;
  width:300px;
  font-size:48px;
  letter-spacing:-1.5px;
}

/* IMAGE ROTATOR */

#rotator{
  position:absolute;
  left:30px;
  top:630px;
  width:520px;
  height:185px;
  z-index:5;
  overflow:hidden;
  background:#000;
  display:grid;
  place-items:center;
}

#rotatorImg{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

#rotatorFallback{
  display:none;
  width:100%;
  height:100%;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:18px;
  box-sizing:border-box;
  font-weight:900;
  text-shadow:
    4px 4px 0 #000,
    -2px 2px 0 #000,
    2px -2px 0 #000;
}

#rotatorFallback .kicker{
  font-size:19px;
  text-transform:uppercase;
  margin-bottom:8px;
}

#rotatorFallback .headline{
  color:#ffe936;
  font-size:36px;
  line-height:.95;
  text-transform:uppercase;
}

#rotatorFallback .body{
  margin-top:10px;
  font-size:20px;
  line-height:1.05;
}

/* SCHEDULE - styled like older LIVE / UP NEXT / AFTER THAT overlay */

#schedule{
  position:absolute;
  left:380px;
  bottom:35px;
  width:1275px;
  height:120px;
  z-index:5;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

.card{
  position:relative;
  overflow:hidden;
  border-radius:16px;
  padding:12px 16px;
  box-sizing:border-box;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
  backdrop-filter:blur(2px);
}

.card.now{
  background:#f73435;
  color:#fff;
}

.card.next{
  background:#fdd324;
  color:#111;
}

.card.later{
  background:#ffffff;
  color:#111;
}

.card-content{
  width:100%;
  height:100%;
  overflow:hidden;
}

.label{
  height:auto;
  display:flex;
  align-items:center;
  gap:8px;
  padding:0;
  margin:0 0 6px 0;
  box-sizing:border-box;
  font-size:13px;
  line-height:1;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  opacity:.96;
}

.label::after{
  content:"";
  display:inline-flex;
  width:fit-content;
  min-width:0;
  height:0;
}

.title{
  height:auto;
  display:block;
  padding:0;
  margin:0 0 5px 0;
  box-sizing:border-box;
  font-size:29px;
  line-height:1;
  font-weight:900;
  text-transform:uppercase;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.sub{
  height:auto;
  display:flex;
  align-items:center;
  gap:8px;
  padding:0;
  margin:0;
  box-sizing:border-box;
  font-size:14px;
  line-height:1.1;
  font-weight:800;
  text-transform:uppercase;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  opacity:.94;
}

.meta-pill{
  display:inline-flex;
  align-items:center;
  max-width:100%;
  padding:3px 9px;
  border-radius:999px;
  background:rgba(0,0,0,.18);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.next .meta-pill,
.later .meta-pill{
  background:rgba(0,0,0,.10);
}

.slide-pop{
  animation:scheduleSlide 520ms cubic-bezier(.22,.95,.36,1);
}

@keyframes scheduleSlide{
  0%{
    transform:translateX(22px);
    opacity:0;
    filter:blur(2px);
  }
  100%{
    transform:translateX(0);
    opacity:1;
    filter:blur(0);
  }
}
</style>
</head>

<body>
<div id="fit">
  <main id="stage">
    <img id="frame" src="../assets/mmm27-16x9.png" alt="">

    <div id="clock" class="live">Loading...</div>
    <div id="amount" class="live">$0.00</div>

    <section id="rotator">
      <img id="rotatorImg" src="../assets/rotator-march-of-dimes.png" alt="">

      <div id="rotatorFallback">
        <div class="kicker">Benefitting</div>
        <div class="headline">March of Dimes</div>
        <div class="body">Every donation helps support moms and babies.</div>
      </div>
    </section>

    <section id="schedule">
      <article class="card now" id="c0">
        <div class="card-content">
          <div class="label">LIVE</div>
          <div class="title">Loading...</div>
          <div class="sub"></div>
        </div>
      </article>

      <article class="card next" id="c1">
        <div class="card-content">
          <div class="label">UP NEXT</div>
          <div class="title">Loading...</div>
          <div class="sub"></div>
        </div>
      </article>

      <article class="card later" id="c2">
        <div class="card-content">
          <div class="label">AFTER THAT</div>
          <div class="title">Loading...</div>
          <div class="sub"></div>
        </div>
      </article>
    </section>
  </main>
</div>

<script>
(function(){
const ET="America/New_York";
const $=id=>document.getElementById(id);

const demoSchedule=[
  {
    start:"2027-03-12T13:00:00-05:00",
    end:"2027-03-12T15:00:00-05:00",
    title:"Super Mario Galaxy",
    streamer:"NerdXD"
  },
  {
    start:"2027-03-12T15:00:00-05:00",
    end:"2027-03-12T17:00:00-05:00",
    title:"Super Mario 3D World",
    streamer:"Streamer Name"
  },
  {
    start:"2027-03-12T17:00:00-05:00",
    end:"2027-03-12T19:00:00-05:00",
    title:"New Super Mario Bros. U",
    streamer:"Streamer Name"
  }
];

const demoRotator=[
  {
    image:"../assets/rotator-march-of-dimes.png",
    kicker:"Benefitting",
    headline:"March of Dimes",
    body:"Every donation helps support moms and babies."
  },
  {
    image:"../assets/rotator-merch.png",
    kicker:"Merch",
    headline:"Mario Mania Gear",
    body:"Grab the official event shirt at mariomaniamarathon.com."
  },
  {
    image:"../assets/rotator-donate.png",
    kicker:"Donate",
    headline:"Support the Event",
    body:"Every dollar helps us reach the campaign goal."
  }
];

let schedule=demoSchedule;
let rotator=demoRotator;
let laterCursor=0;
let rotatorCursor=0;

function fit(){
  const s=Math.min(innerWidth/1920,innerHeight/1080);
  $("stage").style.transform=`translate(-50%,-50%) scale(${s})`;
}

function clock(){
  const p={};
  const f=new Intl.DateTimeFormat("en-US",{
    timeZone:ET,
    year:"numeric",
    month:"numeric",
    day:"numeric",
    hour:"numeric",
    minute:"2-digit",
    hour12:true
  });

  f.formatToParts(new Date()).forEach(x=>p[x.type]=x.value);

  $("clock").textContent =
    `${p.year}-${+p.month}-${+p.day} ${+p.hour}:${p.minute} ${p.dayPeriod} ET`;
}

function money(x){
  return new Intl.NumberFormat("en-US",{
    style:"currency",
    currency:"USD",
    minimumFractionDigits:2,
    maximumFractionDigits:2
  }).format(Number(x||0));
}

async function donation(){
  try{
    const r=await fetch("../data/donation.json?t="+Date.now(),{cache:"no-store"});
    const j=await r.json();
    $("amount").textContent=money(j.amountRaised||j.amount||j.total||5555.55);
  }catch(e){
    $("amount").textContent=money(5555.55);
  }
}

async function loadSchedule(){
  try{
    const r=await fetch("../data/schedule.json?t="+Date.now(),{cache:"no-store"});
    const j=await r.json();
    schedule=Array.isArray(j)?j:(j.schedule||demoSchedule);
  }catch(e){
    schedule=demoSchedule;
  }

  renderSchedule();
}

async function loadRotator(){
  try{
    const r=await fetch("../data/rotator.json?t="+Date.now(),{cache:"no-store"});
    const j=await r.json();
    rotator=Array.isArray(j)?j:(j.rotator||demoRotator);
  }catch(e){
    rotator=demoRotator;
  }

  renderRotator();
}

function items(){
  return schedule
    .map(x=>({...x,_s:new Date(x.start),_e:new Date(x.end)}))
    .filter(x=>!isNaN(x._s))
    .sort((a,b)=>a._s-b._s);
}

function shortTime(x){
  if(!x)return "";
  return new Intl.DateTimeFormat("en-US",{
    timeZone:ET,
    hour:"numeric",
    minute:"2-digit",
    hour12:true
  }).format(x._s);
}

function getCards(){
  const a=items();
  const now=new Date();

  if(!a.length)return [
    ["LIVE",null],
    ["UP NEXT",null],
    ["AFTER THAT",null]
  ];

  const i=a.findIndex(x=>now>=x._s && now<x._e);

  if(i>=0){
    const pool=a.slice(i+2);
    return [
      ["LIVE",a[i]],
      ["UP NEXT",a[i+1]||null],
      ["AFTER THAT",pool.length?pool[laterCursor%pool.length]:null]
    ];
  }

  const upcoming=a.filter(x=>x._s>now);

  if(upcoming.length){
    const pool=upcoming.slice(2);
    return [
      ["SOON",upcoming[0]],
      ["UP NEXT",upcoming[1]||null],
      ["AFTER THAT",pool.length?pool[laterCursor%pool.length]:(upcoming[2]||null)]
    ];
  }

  return [
    ["DONE",a[a.length-1]],
    ["UP NEXT",null],
    ["AFTER THAT",null]
  ];
}

function renderCard(id,label,item){
  const e=$("c"+id);
  const content=e.querySelector(".card-content");
  const labelEl=e.querySelector(".label");
  const titleEl=e.querySelector(".title");
  const subEl=e.querySelector(".sub");

  labelEl.textContent=label;
  titleEl.textContent=item?(item.title||"Untitled Game"):"Schedule Pending";

  if(item){
    const streamer=item.streamer||item.host||"";
    const time=shortTime(item);
    subEl.innerHTML = streamer
      ? `<span class="meta-pill">${time}</span><span class="meta-pill">${streamer}</span>`
      : `<span class="meta-pill">${time}</span>`;
  }else{
    subEl.innerHTML="";
  }

  content.classList.remove("slide-pop");
  void content.offsetWidth;
  content.classList.add("slide-pop");
}

function renderSchedule(){
  getCards().forEach((c,i)=>renderCard(i,c[0],c[1]));
}

function setFallbackText(item){
  document.querySelector("#rotatorFallback .kicker").textContent=item.kicker||"";
  document.querySelector("#rotatorFallback .headline").textContent=item.headline||"";
  document.querySelector("#rotatorFallback .body").textContent=item.body||"";
}

function renderRotator(){
  const item=rotator[rotatorCursor%rotator.length]||demoRotator[0];
  const img=$("rotatorImg");
  const fallback=$("rotatorFallback");

  setFallbackText(item);

  if(!item.image){
    img.style.display="none";
    fallback.style.display="flex";
    return;
  }

  img.onload=function(){
    img.style.display="block";
    fallback.style.display="none";
  };

  img.onerror=function(){
    img.style.display="none";
    fallback.style.display="flex";
  };

  img.src=item.image;
}

fit();
clock();
donation();
loadSchedule();
loadRotator();

setInterval(clock,1000);
setInterval(donation,15000);
setInterval(loadSchedule,60000);
setInterval(loadRotator,60000);

setInterval(()=>{
  laterCursor++;
  renderSchedule();
},10000);

setInterval(()=>{
  rotatorCursor++;
  renderRotator();
},12000);

addEventListener("resize",fit);
})();
</script>
</body>
</html>
