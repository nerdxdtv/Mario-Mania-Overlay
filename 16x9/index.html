<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Mario Mania Marathon 2027 — 16:9 Overlay</title>

    <link
        rel="stylesheet"
        href="../css/overlay.css"
    >

    <script
        src="../js/overlay.js"
        defer
    ></script>
</head>

<body>
    <main class="overlay">

        <img
            class="overlay-frame"
            src="../assets/frames/mmm27-16x9.png"
            alt=""
        >

        <section
            class="info-rotator"
            aria-label="Mario Mania information"
        >
            <img
                id="rotator-image"
                class="rotator-image"
                src="../assets/rotator/march-of-dimes.png"
                alt="March of Dimes"
            >
        </section>

        <div
            id="event-clock"
            class="event-clock"
            aria-label="Current Eastern date and time"
        >
            LOADING...
        </div>

        <div
            id="donation-total"
            class="donation-total"
            aria-label="Current donation total"
        >
            $0
        </div>

    </main>
</body>
</html>
