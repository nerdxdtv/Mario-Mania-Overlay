<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Mario Mania Marathon 2027 — 16:9 Overlay</title>

    <link
        rel="stylesheet"
        href="../css/overlay.css?v=7"
    >

    <script
        src="../js/overlay.js?v=7"
        defer
    ></script>
</head>

<body>
    <main class="overlay">

        <!--
            Informational image rotator.
            CSS places this beneath the static overlay artwork.
        -->
        <section
            class="info-rotator"
            aria-label="Mario Mania information"
        >
            <img
                id="rotator-image"
                class="rotator-image"
                src="../assets/rotator/march-of-dimes.png"
                alt="March of Dimes"
            >
        </section>

        <!-- Static 1920 × 1080 overlay artwork -->
        <img
            class="overlay-frame"
            src="../assets/frames/mmm27-16x9.png"
            alt=""
        >

        <!-- Current Eastern date and time -->
        <div
            id="event-clock"
            class="event-clock"
            aria-label="Current Eastern date and time"
        >
            LOADING...
        </div>

        <!-- Live Tiltify donation total -->
        <div
            id="donation-total"
            class="donation-total"
            aria-label="Current donation total"
        >
            $0.00
        </div>

    </main>

    <!-- Force GitHub Pages redeployment -->
</body>
</html>
