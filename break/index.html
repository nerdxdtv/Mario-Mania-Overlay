<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Mario Mania Marathon 2027 — Break Screen Overlay</title>

  <!-- Shared overlay appearance -->
  <link
    rel="stylesheet"
    href="../css/overlay.css?v=12"
  >

  <!-- Break-screen-specific appearance and positioning -->
  <link
    rel="stylesheet"
    href="../css/break-screen.css?v=8"
  >

  <!-- Donation total, rotator, polls, milestones, and announcements -->
  <script
    src="../js/overlay.js?v=11"
    defer
  ></script>

  <!-- Break-screen prizes and future trivia behavior -->
  <script
    src="../js/break-screen.js?v=1"
    defer
  ></script>
</head>

<body
  class="layout-break"
  data-rotator-set="break"
>
  <main class="overlay break-overlay">

    <!-- Donation parallax scene -->
    <section
      class="break-donation-panel"
      aria-label="Mario Mania donation scenery"
    >
      <div
        class="donation-parallax"
        aria-hidden="true"
      >
        <div
          class="donation-parallax-layer parallax-background"
        ></div>

        <div
          class="donation-parallax-layer parallax-midground"
        ></div>

        <div
          class="donation-parallax-layer parallax-foreground"
        ></div>

        <div
          class="donation-parallax-layer parallax-close-foreground"
        ></div>
      </div>
    </section>

    <!-- Prize image area -->
    <section
      class="break-prize-panel"
      aria-label="Mario Mania prizes"
    >
      <img
        id="prize-image"
        class="prize-image"
        src="../assets/break/prizes/prize-placeholder.png"
        alt="Featured Mario Mania prize"
      >
    </section>

    <!-- Informational images and Tiltify incentive cards -->
    <section
      class="info-rotator break-info-rotator"
      aria-label="Mario Mania information and donation incentives"
    >
      <img
        id="rotator-image"
        class="rotator-image"
        src="../assets/rotator/break/march-of-dimes.png"
        alt="March of Dimes"
      >

      <article
        id="incentive-card"
        class="incentive-card"
        aria-live="polite"
        hidden
      >
        <div
          id="incentive-label"
          class="incentive-label"
        >
          DONATION POLL
        </div>

        <div
          id="incentive-title"
          class="incentive-title"
        ></div>

        <div
          id="incentive-options"
          class="incentive-options"
        ></div>

        <div
          id="incentive-footer"
          class="incentive-footer"
        ></div>
      </article>
    </section>

    <!-- Reserved for future animated trivia GIFs -->
    <section
      class="break-trivia-panel"
      aria-label="Mario Mania trivia"
      hidden
    >
      <img
        id="trivia-image"
        class="trivia-image"
        src=""
        alt="Mario Mania trivia"
      >
    </section>

    <!-- Static 1920 × 1080 break-screen artwork, including Mama Mia -->
    <img
      class="overlay-frame break-frame"
      src="../assets/frames/mmm27-break.png"
      alt=""
    >

    <!--
      Direct child of break-overlay so it can render above the frame.
      Keeping this inside break-donation-panel would trap it beneath
      the panel's lower stacking context.
    -->
    <div
      id="donation-total"
      class="donation-total break-donation-total"
      aria-live="polite"
      aria-label="Current Mario Mania donation total"
    >
      $0.00
    </div>

    <!-- Retained for compatibility with the shared overlay script -->
    <div
      id="event-clock"
      class="event-clock break-hidden"
      aria-hidden="true"
    >
      LOADING...
    </div>

  </main>
</body>
</html>
